allowBuilds:
  '@playwright/browser-chromium': true
  esbuild: true
  simple-git-hooks: true
patchedDependencies:
  '@codemirror/lang-markdown@6.5.0': patches/@codemirror__lang-markdown@6.5.0.patch
  '@lezer/markdown': patches/@lezer__markdown.patch
# mocha pins serialize-javascript ^6.x, which is vulnerable (GHSA: RCE via
# RegExp.flags); force the patched 7.x line until mocha moves upstream.
overrides:
  serialize-javascript: ^7.0.5
