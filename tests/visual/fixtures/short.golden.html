<div style="width: 800px;">
  <div class="cm-editor">
    <div class="cm-announced" aria-live="polite"></div>
    <div tabindex="-1" class="cm-scroller">
      <div
        spellcheck="false"
        autocorrect="off"
        autocapitalize="off"
        writingsuggestions="false"
        translate="no"
        contenteditable="true"
        style="tab-size: 4;"
        class="cm-content cm-lineWrapping"
        role="textbox"
        aria-multiline="true"
        data-language="markdown"
        aria-autocomplete="list"
      >
        <div class="cm-line plainmark-h1 plainmark-collapse-adjacent">
          <span class="plainmark-heading-marker"
            ><span class="plainmark-syntax-meta">#</span> </span
          >Short fixture
        </div>
        <div class="cm-line"><br /></div>
        <div class="cm-line">
          A small document for the composition snapshot suite.
        </div>
        <div class="cm-line"><br /></div>
        <div class="cm-line">
          It contains one
          <span class="plainmark-inline-marker-hidden"
            ><span class="plainmark-syntax-meta">**</span></span
          ><span class="plainmark-strong">bold</span
          ><span class="plainmark-inline-marker-hidden"
            ><span class="plainmark-syntax-meta">**</span></span
          >
          word and a sentence of plain prose. No math, no images, no tables —
          the simplest possible exercise for the renderer.
        </div>
        <div class="cm-line"><br /></div>
      </div>
      <div
        class="cm-layer cm-layer-above cm-cursorLayer"
        aria-hidden="true"
        style="z-index: 150; animation-duration: 1200ms;"
      ></div>
      <div
        class="cm-layer cm-selectionLayer"
        aria-hidden="true"
        style="z-index: -2;"
      ></div>
      <div
        class="cm-layer cm-clippedSelectionLayer"
        aria-hidden="true"
        style="z-index: -3;"
      ></div>
    </div>
  </div>
</div>
