<div style="width: 800px;">
  <div class="cm-editor">
    <div class="cm-announced" aria-live="polite"></div>
    <div tabindex="-1" class="cm-scroller">
      <div
        spellcheck="false"
        autocorrect="off"
        autocapitalize="off"
        writingsuggestions="false"
        translate="no"
        contenteditable="true"
        style="tab-size: 4;"
        class="cm-content cm-lineWrapping"
        role="textbox"
        aria-multiline="true"
        data-language="markdown"
        aria-autocomplete="list"
      >
        <div class="cm-line plainmark-h1 plainmark-collapse-adjacent">
          <span class="plainmark-heading-marker"
            ><span class="plainmark-syntax-meta">#</span> </span
          >Tables composition fixture
        </div>
        <div class="cm-line plainmark-paragraph-gap"><br /></div>
        <div class="cm-line plainmark-paragraph-gap">
          A small table mixing inline emit constructs.
        </div>
        <div class="cm-line plainmark-paragraph-gap"><br /></div>
        <div
          class="plainmark-table-block plainmark-block-gap-above"
          data-table-from="76"
          contenteditable="false"
        >
          <table>
            <thead>
              <tr>
                <th data-row-index="0" data-col-index="0">Style</th>
                <th data-row-index="0" data-col-index="1">Reference</th>
                <th data-row-index="0" data-col-index="2">Math</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td data-row-index="1" data-col-index="0">
                  <strong>bold</strong>
                </td>
                <td data-row-index="1" data-col-index="1">
                  <a href="https://x.test">link</a>
                </td>
                <td data-row-index="1" data-col-index="2">
                  <span class="plainmark-math-inline"
                    ><math-placeholder display="inline"></math-placeholder
                  ></span>
                </td>
              </tr>
              <tr>
                <td data-row-index="2" data-col-index="0">plain</td>
                <td data-row-index="2" data-col-index="1">y</td>
                <td data-row-index="2" data-col-index="2">z</td>
              </tr>
            </tbody>
          </table>
        </div>
        <div class="cm-line plainmark-paragraph-gap"><br /></div>
      </div>
      <div
        class="cm-layer cm-layer-above cm-cursorLayer"
        aria-hidden="true"
        style="z-index: 150; animation-duration: 1200ms;"
      ></div>
      <div
        class="cm-layer cm-selectionLayer"
        aria-hidden="true"
        style="z-index: -2;"
      ></div>
      <div
        class="cm-layer cm-clippedSelectionLayer"
        aria-hidden="true"
        style="z-index: -3;"
      ></div>
    </div>
  </div>
</div>
